name: Coleta RSS G1

on:
  schedule:
    - cron: '0 9,15,21 * * *'  # 3x ao dia (horário UTC)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Coletar feeds RSS
        run: python src/collect/rss_collector.py

      - name: Commit dos novos dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/articles.jsonl
          git diff --staged --quiet || git commit -m "chore: coleta automática de artigos RSS"
          git push
